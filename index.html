<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Charts - Full UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            background-color: #0F0F0F;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .chart-panel {
            flex: 1;
            position: relative;
            overflow: visible;
        }
        /* Extra padding on left chart to protect its right price scale from the divider */
        .chart-panel.left {
            padding-right: 72px;
        }
        /* Extra padding on right chart to protect its left side toolbar */
        .chart-panel.right {
            padding-left: 62px;
        }
        .chart-panel:not(:last-child) {
            border-right: 4px solid #1a1a1a;
        }
        
        /* Conservative scale so all UI elements remain fully visible */
        :root {
            --chart-scale: 1.14;   /* ← Increase to 1.18–1.20 for larger text or decrease to 1.10 if any clipping occurs */
        }
        
        .tradingview-widget-container {
            position: absolute;
            top: -7%;
            left: -7%;
            width: calc(114% / var(--chart-scale));
            height: calc(114% / var(--chart-scale));
            transform: scale(var(--chart-scale));
            transform-origin: top left;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Bitcoin Chart (left) – FULL normal TradingView UI -->
        <div class="chart-panel left">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                  "allow_symbol_change": true,
                  "calendar": false,
                  "details": false,
                  "hide_side_toolbar": false,
                  "hide_top_toolbar": false,
                  "hide_legend": true,
                  "hide_volume": true,
                  "interval": "240",
                  "locale": "en",
                  "save_image": false,
                  "style": "1",
                  "symbol": "KRAKEN:BTCUSD",
                  "theme": "dark",
                  "timezone": "America/Phoenix",
                  "backgroundColor": "#0F0F0F",
                  "gridColor": "rgba(242, 242, 242, 0.06)",
                  "withdateranges": false,
                  "studies": [
                    "STD;Bollinger_Bands",
                    "STD;Stochastic_RSI"
                  ],
                  "autosize": true
                }
                </script>
            </div>
        </div>
        
        <!-- S&P 500 Chart (right) – FULL normal TradingView UI -->
        <div class="chart-panel right">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                  "allow_symbol_change": true,
                  "calendar": false,
                  "details": false,
                  "hide_side_toolbar": false,
                  "hide_top_toolbar": false,
                  "hide_legend": true,
                  "hide_volume": true,
                  "interval": "240",
                  "locale": "en",
                  "save_image": false,
                  "style": "1",
                  "symbol": "FOREXCOM:SPXUSD",
                  "theme": "dark",
                  "timezone": "America/Phoenix",
                  "backgroundColor": "#0F0F0F",
                  "gridColor": "rgba(242, 242, 242, 0.06)",
                  "withdateranges": false,
                  "studies": [
                    "STD;Bollinger_Bands",
                    "STD;Stochastic_RSI"
                  ],
                  "autosize": true
                }
                </script>
            </div>
        </div>
        
    </div>
</body>
</html>
