<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Charts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            background-color: #0F0F0F;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .chart-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .chart-panel:not(:last-child) {
            border-right: 4px solid #1a1a1a;
        }
        
        /* Adjust this single value to control text size */
        :root {
            --chart-scale: 1.30;   /* Increase to 1.35–1.45 for even larger text; decrease if needed */
        }
        
        .chart-panel iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100% / var(--chart-scale));
            height: calc(100% / var(--chart-scale));
            transform: scale(var(--chart-scale));
            transform-origin: top left;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Bitcoin Chart (left) -->
        <div class="chart-panel">
            <iframe 
                src="https://s.tradingview.com/embed-widget/advanced-chart/?locale=en&symbol=KRAKEN%3ABTCUSD&interval=240&theme=dark&style=1&timezone=America%2FPhoenix&backgroundColor=%230F0F0F&gridColor=rgba(242%2C%20242%2C%20242%2C%200.06)&hide_side_toolbar=true&hide_top_toolbar=false&hide_legend=true&hide_volume=true&withdateranges=false&autosize=true&allow_symbol_change=true&details=false&calendar=false" 
                allowfullscreen="true">
            </iframe>
        </div>
        
        <!-- S&P 500 Chart (right) -->
        <div class="chart-panel">
            <iframe 
                src="https://s.tradingview.com/embed-widget/advanced-chart/?locale=en&symbol=FOREXCOM%3ASPXUSD&interval=240&theme=dark&style=1&timezone=America%2FPhoenix&backgroundColor=%230F0F0F&gridColor=rgba(242%2C%20242%2C%20242%2C%200.06)&hide_side_toolbar=true&hide_top_toolbar=false&hide_legend=true&hide_volume=true&withdateranges=false&autosize=true&allow_symbol_change=true&details=false&calendar=false" 
                allowfullscreen="true">
            </iframe>
        </div>
    </div>
</body>
</html>
