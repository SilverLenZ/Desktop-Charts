<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Desktop Charts - Full UI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0F0F0F;
        font-family: Arial, sans-serif;
    }

    .container {
        display: flex;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    .chart-panel {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #0F0F0F;
    }

    .chart-panel.left {
        border-right: 4px solid #1A1A1A;
    }

    .tv-wrap {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
    }

    .tradingview-widget-container {
        width: 100%;
        height: 100%;
    }

    .tradingview-widget-container__widget {
        width: 100%;
        height: 100%;
    }

    iframe {
        width: 100% !important;
        height: 100% !important;
    }
</style>
</head>

<body>

<div class="container">

    <!-- BTC -->
    <div class="chart-panel left">
        <div class="tv-wrap">

            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>

                <script
                    type="text/javascript"
                    src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js"
                    async>
                {
                  "autosize": true,
                  "symbol": "KRAKEN:BTCUSD",
                  "interval": "240",
                  "timezone": "America/Phoenix",
                  "theme": "dark",
                  "style": "1",
                  "locale": "en",

                  "allow_symbol_change": true,

                  "hide_top_toolbar": false,
                  "hide_side_toolbar": false,
                  "hide_legend": false,
                  "hide_volume": false,

                  "withdateranges": true,
                  "details": true,
                  "calendar": false,

                  "backgroundColor": "#0F0F0F",
                  "gridColor": "rgba(242,242,242,0.06)",

                  "studies": [
                    "STD;Bollinger_Bands",
                    "STD;Stochastic_RSI"
                  ]
                }
                </script>
            </div>

        </div>
    </div>

    <!-- SPX -->
    <div class="chart-panel right">
        <div class="tv-wrap">

            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>

                <script
                    type="text/javascript"
                    src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js"
                    async>
                {
                  "autosize": true,
                  "symbol": "FOREXCOM:SPXUSD",
                  "interval": "240",
                  "timezone": "America/Phoenix",
                  "theme": "dark",
                  "style": "1",
                  "locale": "en",

                  "allow_symbol_change": true,

                  "hide_top_toolbar": false,
                  "hide_side_toolbar": false,
                  "hide_legend": false,
                  "hide_volume": false,

                  "withdateranges": true,
                  "details": true,
                  "calendar": false,

                  "backgroundColor": "#0F0F0F",
                  "gridColor": "rgba(242,242,242,0.06)",

                  "studies": [
                    "STD;Bollinger_Bands",
                    "STD;Stochastic_RSI"
                  ]
                }
                </script>
            </div>

        </div>
    </div>

</div>

</body>
</html>
