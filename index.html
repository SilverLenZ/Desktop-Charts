<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Desktop Charts - Main Mode</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        background: #0F0F0F;
        font-family: Arial, sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
    }

    .app {
        display: flex;
        flex-direction: column;
        width: 100%;
    }

    /* TOP TWO CHARTS */
    .top-row {
        display: flex;
        width: 100%;
        height: 60vh;
        min-height: 500px;
    }

    .chart-panel {
        flex: 1;
        position: relative;
        background: #0F0F0F;
    }

    .chart-panel.left {
        border-right: 4px solid #1A1A1A;
    }

    .tv-wrap {
        position: absolute;
        inset: 0;
    }

    .tradingview-widget-container,
    .tradingview-widget-container__widget {
        width: 100%;
        height: 100%;
    }

    /* MAIN MODE BOTTOM CHART */
    .bottom-chart {
        width: 100%;
        height: 95vh;
        min-height: 850px;
        border-top: 4px solid #1A1A1A;
    }
</style>
</head>

<body>

<div class="app">

    <!-- TOP ROW -->
    <div class="top-row">

        <!-- BTC -->
        <div class="chart-panel left">
            <div class="tv-wrap">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>

                    <script src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                    {
                      "autosize": true,
                      "symbol": "KRAKEN:BTCUSD",
                      "interval": "240",
                      "theme": "dark",
                      "style": "1",
                      "locale": "en",
                      "hide_side_toolbar": false,
                      "hide_top_toolbar": false,
                      "hide_volume": false,
                      "allow_symbol_change": true
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- SPX -->
        <div class="chart-panel">
            <div class="tv-wrap">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>

                    <script src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                    {
                      "autosize": true,
                      "symbol": "FOREXCOM:SPXUSD",
                      "interval": "240",
                      "theme": "dark",
                      "style": "1",
                      "locale": "en",
                      "hide_side_toolbar": false,
                      "hide_top_toolbar": false,
                      "hide_volume": false,
                      "allow_symbol_change": true
                    }
                    </script>
                </div>
            </div>
        </div>

    </div>

    <!-- MAIN TRADING VIEW MODE CHART -->
    <div class="bottom-chart">

        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div class="tradingview-widget-container__widget"></div>

            <script src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
            {
              "autosize": true,

              "symbol": "KRAKEN:BTCUSD",
              "interval": "60",

              "theme": "dark",
              "style": "1",
              "locale": "en",

              /* FULL EXECUTION-STYLE EXPERIENCE */
              "hide_top_toolbar": false,
              "hide_side_toolbar": false,
              "hide_volume": false,

              "hide_legend": true,
              "hide_ideas": true,
              "hide_symbol_logo": false,

              "withdateranges": false,
              "calendar": false,
              "details": false,

              "allow_symbol_change": true,

              /* CLEAN INDICATOR SET (ONLY STOCH RSI) */
              "studies": [
                "STD;Stochastic_RSI"
              ]
            }
            </script>

        </div>

    </div>

</div>

</body>
</html>
